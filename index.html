<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUSHI KYTO | NEXO PLATFORM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;900&display=swap');
        
        :root {
            --kyto-red: #E31C24;
            --glass: rgba(10, 10, 10, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: white; overflow-x: hidden; min-height: 100vh; }

        /* FONDO MEJORADO: MADERA OSCURA Y DETALLES JAPONESES */
        .bg-zen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1557180295-76eee20ae8aa?q=80&w=2000');
            background-size: cover; z-index: -2;
        }

        /* PÉTALOS DE CEREZO (MÁS SUTILES) */
        .sakura {
            position: fixed; top: -10%; background: #ffc0cb;
            border-radius: 50% 0 50% 50%; opacity: 0.6;
            animation: fall linear infinite; z-index: -1; pointer-events: none;
        }
        @keyframes fall {
            0% { transform: translateY(0vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(100px); }
        }

        /* RELOJ CORREGIDO (ESPAÑOL) */
        .reloj-wrapper {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 500; background: var(--glass); backdrop-filter: blur(15px);
            padding: 10px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        #time-display { font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; color: white; }
        .time-tag { font-size: 8px; color: var(--kyto-red); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; display: block; }

        /* CARRITO CORREGIDO */
        .cart-sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px;
            height: 100%; background: #0a0a0a; z-index: 1100; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-left: 1px solid #222;
        }
        .cart-open { right: 0; }

        /* PRODUCTOS */
        .card-kyto {
            background: rgba(20,20,20,0.6); border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
            transition: 0.3s;
        }
        .card-kyto:hover { border-color: var(--kyto-red); transform: translateY(-5px); }

        /* GATO CORREGIDO (YA NO ESTÁ DEFORME) */
        .maneki-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 600; cursor: pointer;
            width: 100px; height: 100px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid var(--kyto-red);
        }
        .maneki-img { width: 70px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* MINIJUEGO CONTENEDOR */
        canvas { background: #111; border-radius: 15px; cursor: none; width: 100%; max-width: 600px; }
        
        .btn-red { background: var(--kyto-red); color: white; font-weight: 900; border-radius: 15px; padding: 15px; transition: 0.2s; }
        .btn-red:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="bg-zen"></div>
    <div id="sakura-container"></div>

    <div class="reloj-wrapper">
        <div id="time-display">00:00:00</div>
        <span class="time-tag">Reloj importado por el equipo Nexo</span>
    </div>

    <nav class="fixed top-[100px] w-full z-40 px-6">
        <div class="max-w-6xl mx-auto bg-black/50 backdrop-blur-md p-6 rounded-[35px] flex justify-between items-center border border-white/5">
            <div>
                <h1 class="text-3xl font-black italic uppercase">Sushi <span class="text-red-600">Kyto</span></h1>
                <p class="text-[10px] font-bold text-gray-300 tracking-tighter uppercase">Comida japonesa con ingredientes de nuestra tierra</p>
            </div>
            <button onclick="toggleCart()" class="bg-white text-black px-6 py-3 rounded-2xl font-black flex items-center gap-2">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-counter">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-6 pt-[250px] pb-20">
        <div id="grid-menu" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>
    </main>

    <div class="maneki-btn" onclick="openGame()">
        <img src="https://cdn-icons-png.flaticon.com/512/1010/1010379.png" class="maneki-img" alt="Gato">
    </div>

    <aside id="cart-sidebar" class="cart-sidebar">
        <div class="p-8 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-3xl font-black italic uppercase">Resumen</h2>
            <button onclick="toggleCart()" class="text-4xl">&times;</button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4">
            </div>

        <div class="p-8 bg-zinc-900/50 space-y-4">
            <div class="flex justify-between font-bold text-xl">
                <span>Total:</span>
                <span id="total-val" class="text-red-600">$0</span>
            </div>
            <input type="text" id="order-address" placeholder="Dirección de entrega en Teziutlán" class="w-full p-4 rounded-xl bg-black border border-white/10">
            <button onclick="checkoutWhatsApp()" class="btn-red w-full text-lg">PAGAR POR WHATSAPP</button>
            <a href="https://wa.me/522311511435" target="_blank" class="block text-center text-xs font-bold text-green-500 uppercase">¿Necesitas ayuda? Chat de soporte</a>
        </div>
    </aside>

    <div id="game-modal" class="hidden fixed inset-0 bg-black/95 z-[2000] flex items-center justify-center p-6">
        <div class="text-center w-full max-w-2xl">
            <h2 class="text-2xl font-bold mb-4 italic">ATRAPA EL SUSHI CON EL PLATO</h2>
            <canvas id="gameCanvas"></canvas>
            <p class="mt-4 text-gray-400 text-sm">Usa el mouse o el dedo para mover el plato</p>
            <button onclick="closeGame()" class="mt-6 text-red-600 font-black uppercase">Cerrar Juego</button>
        </div>
    </div>

    <script>
        const menu = [
            {id: 1, name: "California Roll", price: 105, img: "https://images.unsplash.com/photo-1593504049359-74330189a345?w=400"},
            {id: 2, name: "Flaming Roll", price: 149, img: "https://images.unsplash.com/photo-1579584425555-c3ce17fd4111?w=400"},
            {id: 3, name: "Yakimeshi Especial", price: 95, img: "https://images.unsplash.com/photo-1512314889357-e157c22f938d?w=400"}
        ];

        let cart = [];

        function render() {
            document.getElementById('grid-menu').innerHTML = menu.map(item => `
                <div class="card-kyto">
                    <img src="${item.img}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h3 class="font-black uppercase italic">${item.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-xl font-bold text-red-600">$${item.price}</span>
                            <button onclick="addToCart(${item.id})" class="bg-white text-black px-4 py-2 rounded-lg font-bold text-xs">AGREGAR</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = menu.find(i => i.id === id);
            cart.push(item);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-counter').innerText = cart.length;
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            document.getElementById('total-val').innerText = `$${total}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, index) => `
                <div class="flex justify-between bg-white/5 p-4 rounded-xl">
                    <span class="text-sm font-bold">${item.name}</span>
                    <button onclick="cart.splice(${index},1);updateCart()" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('cart-open'); }

        function checkoutWhatsApp() {
            const addr = document.getElementById('order-address').value;
            if(!addr) return alert("Pon tu dirección");
            const text = `🍣 Nuevo Pedido: ${cart.length} productos. Total: ${document.getElementById('total-val').innerText}. Envío a: ${addr}`;
            window.open(`https://wa.me/522311511435?text=${encodeURIComponent(text)}`);
        }

        // --- RELOJ ---
        setInterval(() => {
            document.getElementById('time-display').innerText = new Date().toLocaleTimeString('es-MX', {hour12:false});
        }, 1000);

        // --- PÉTALOS ---
        for(let i=0; i<15; i++) {
            const p = document.createElement('div');
            p.className = 'sakura';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 10 + 5) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 4) + 's';
            p.style.delay = Math.random() * 5 + 's';
            document.getElementById('sakura-container').appendChild(p);
        }

        // --- JUEGO BALANCEADO ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, playerX = 250, items = [];

        function openGame() {
            document.getElementById('game-modal').classList.remove('hidden');
            canvas.width = Math.min(window.innerWidth - 40, 500);
            canvas.height = 400;
            gameActive = true;
            items = [];
            requestAnimationFrame(gameLoop);
        }

        function closeGame() {
            gameActive = false;
            document.getElementById('game-modal').classList.add('hidden');
        }

        function gameLoop() {
            if(!gameActive) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);

            // PLATO (Jugador)
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.ellipse(playerX, canvas.height - 20, 40, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // SUSHI CAYENDO (Menos cantidad, más fácil)
            if(Math.random() < 0.02) items.push({x: Math.random() * canvas.width, y: 0});

            items.forEach((item, index) => {
                item.y += 3; // Velocidad reducida
                ctx.font = "30px Arial";
                ctx.fillText("🍣", item.x - 15, item.y);

                if(item.y > canvas.height - 30 && Math.abs(item.x - playerX) < 40) {
                    items.splice(index, 1);
                } else if(item.y > canvas.height) {
                    items.splice(index, 1);
                }
            });

            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousemove', e => playerX = e.offsetX);
        canvas.addEventListener('touchmove', e => {
            playerX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            e.preventDefault();
        });

        render();
    </script>
</body>
</html>
