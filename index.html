<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUSHI KYTO | NEXO OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700;900&display=swap');
        
        :root { --kyto-red: #E31C24; --nexo-gold: #FFD700; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* FONDO HDR DINÁMICO */
        .hdr-bg {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZleHlzYW9uZWU0dzlreGgxaGN2emFpYjBzMGZtczFmeHVqbjgzbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3oKIPa2TdahY8Lqt20/giphy.gif');
            background-size: cover; background-position: center; z-index: -2;
            filter: saturate(1.5) contrast(1.1);
        }

        /* RELOJ CENTRADO PROFESIONAL */
        .nexo-clock-center {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); padding: 10px 30px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); width: auto; min-width: 250px;
        }
        #time-display { font-weight: 900; font-size: 2.2rem; letter-spacing: 3px; font-variant-numeric: tabular-nums; }
        .clock-tag { font-size: 7px; text-transform: uppercase; letter-spacing: 4px; color: var(--kyto-red); font-weight: 900; }

        /* BOTONES DE ACCIÓN */
        .action-btn {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .action-btn:hover { background: #fff; color: #000; transform: scale(1.1); }

        /* PRODUCT CARDS HDR */
        .kyto-item {
            background: linear-gradient(145deg, rgba(20,20,20,0.8), rgba(0,0,0,1));
            border: 1px solid rgba(255,255,255,0.05); border-radius: 30px;
            overflow: hidden; transition: all 0.5s ease;
        }
        .kyto-item:hover { border-color: var(--kyto-red); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(227, 28, 36, 0.2); }

        /* GATO MANEKI-NEKO HDR */
        .maneki-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 500;
            cursor: pointer; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .paw-anim { animation: wave 1s ease-in-out infinite; transform-origin: bottom right; }
        @keyframes wave { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-20deg); } }

        /* MODALES PRO */
        .modal-blur {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(30px); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }

        /* HARDWARE ADAPTATIVO */
        .pc-monitor { width: 850px; height: 500px; border: 15px solid #222; border-radius: 20px; background: #050505; position: relative; }
        .mobile-phone { width: 320px; height: 650px; border: 12px solid #1a1a1a; border-radius: 50px; background: #050505; position: relative; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--kyto-red); border-radius: 10px; }

        @media (max-width: 768px) {
            .nexo-clock-center { top: 10px; padding: 5px 20px; min-width: 180px; }
            #time-display { font-size: 1.4rem; }
            .main-title { font-size: 3rem !important; }
        }
    </style>
</head>
<body>

    <div class="hdr-bg"></div>

    <header class="container mx-auto px-6 pt-24 pb-12 relative z-50">
        <div class="nexo-clock-center">
            <span id="time-display">00:00:00</span>
            <div class="clock-tag">Reloj importado por el equipo Nexo</div>
        </div>

        <nav class="flex justify-between items-center mt-12">
            <div class="flex flex-col">
                <h1 class="main-title text-7xl font-black italic uppercase tracking-tighter leading-none">
                    Sushi <span class="text-[#E31C24]">Kyto</span>
                </h1>
                <p class="text-[10px] sm:text-xs font-bold text-gray-400 mt-2 uppercase tracking-[3px]">
                    Comida japonesa con ingredientes de nuestra tierra
                </p>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="openModal('modal-login')" class="action-btn p-4 sm:px-6 py-4 flex items-center gap-3">
                    <i class="fa-solid fa-user-ninja text-xl"></i>
                    <span class="hidden sm:block font-black text-[10px] tracking-widest uppercase">Login</span>
                </button>
                <button onclick="openModal('modal-cart')" class="action-btn bg-white text-black p-4 sm:px-6 py-4 relative">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cart-badge" class="absolute -top-2 -right-2 bg-[#E31C24] text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-black">0</span>
                </button>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 pb-40">
        <div id="dynamic-menu" class="space-y-32">
            </div>
    </main>

    <div class="maneki-container" onclick="initGame()">
        <svg width="100" height="100" viewBox="0 0 200 200">
            <path d="M60 50 L40 10 L80 40 Z" fill="white" stroke="#eee" />
            <path d="M140 50 L160 10 L120 40 Z" fill="white" stroke="#eee" />
            <circle cx="100" cy="140" r="55" fill="white" />
            <circle cx="100" cy="80" r="45" fill="white" />
            <circle cx="80" cy="85" r="6" fill="#111" />
            <circle cx="120" cy="85" r="6" fill="#111" />
            <circle cx="100" cy="95" r="4" fill="#ffb7c5" />
            <circle cx="70" cy="100" r="8" fill="#ffb7c5" opacity="0.3" />
            <circle cx="130" cy="100" r="8" fill="#ffb7c5" opacity="0.3" />
            <g class="paw-anim">
                <path d="M145 100 Q175 40 150 40 T130 90" fill="white" stroke="#eee" stroke-width="2"/>
                <circle cx="150" cy="45" r="10" fill="white" />
                <path d="M145 45 Q150 35 155 45" fill="#ffb7c5" />
            </g>
            <circle cx="100" cy="145" r="22" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
            <text x="94" y="153" font-weight="900" font-size="20" fill="#B8860B">¥</text>
        </svg>
    </div>

    <div id="modal-login" class="modal-blur">
        <div class="bg-zinc-950 w-full max-w-md p-10 rounded-[3rem] border border-white/10 shadow-2xl animate-scaleIn">
            <div class="text-center mb-10">
                <div class="w-24 h-24 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fa-solid fa-user-shield text-4xl text-red-600"></i>
                </div>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Acceso Cliente</h2>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mt-2">Nexo Security Authenticator</p>
            </div>
            <div class="space-y-4">
                <button onclick="mockLogin()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase text-xs tracking-[3px] flex items-center justify-center gap-4 hover:scale-105 transition">
                    <img src="https://www.google.com/favicon.ico" class="w-4"> Continuar con Google
                </button>
                <button onclick="closeModal('modal-login')" class="w-full text-xs font-bold text-gray-600 uppercase tracking-widest py-4">Volver al sitio</button>
            </div>
        </div>
    </div>

    <div id="modal-cart" class="modal-blur">
        <div class="bg-zinc-950 w-full max-w-2xl p-8 rounded-[3rem] border border-white/10 flex flex-col max-h-[90vh] shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-5xl font-black italic uppercase tracking-tighter">Mi Bolsa</h2>
                <button onclick="closeModal('modal-cart')" class="text-4xl">&times;</button>
            </div>
            <div id="cart-list" class="flex-grow overflow-y-auto space-y-4 pr-2">
                </div>
            <div class="mt-8 pt-8 border-t border-white/10 space-y-6">
                <div class="space-y-2">
                    <div class="flex justify-between text-gray-500 font-bold uppercase text-[10px] tracking-widest">
                        <span>Subtotal</span>
                        <span id="sub-price">$0</span>
                    </div>
                    <div class="flex justify-between text-red-600 font-black uppercase text-[10px] tracking-widest">
                        <span>Envío Domicilio (Teziutlán)</span>
                        <span>$40</span>
                    </div>
                    <div class="flex justify-between text-4xl font-black pt-4">
                        <span>TOTAL</span>
                        <span id="total-price">$0</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="cust-name" placeholder="NOMBRE COMPLETO" class="bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 font-bold uppercase text-xs">
                    <input type="text" id="cust-address" placeholder="DIRECCIÓN Y REFERENCIAS" class="bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 font-bold uppercase text-xs">
                    <button onclick="checkout()" class="bg-[#E31C24] py-6 rounded-[2rem] font-black uppercase tracking-widest text-sm shadow-xl hover:bg-red-700 transition">Confirmar por WhatsApp</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-game" class="modal-blur">
        <div id="game-frame" class="relative">
            <canvas id="gameCanvas"></canvas>
            <div id="game-over" class="absolute inset-0 bg-black/90 hidden flex flex-col items-center justify-center p-10 text-center">
                <h2 class="text-6xl font-black text-red-600 mb-6 italic uppercase">Game Over</h2>
                <p id="final-score" class="text-xl font-bold mb-10">Puntuación: 0</p>
                <button onclick="initGame()" class="bg-white text-black px-12 py-4 rounded-full font-black uppercase tracking-widest">Reintentar</button>
            </div>
        </div>
        <button onclick="closeGame()" class="fixed top-10 right-10 text-white text-5xl">&times;</button>
    </div>

    <a href="https://wa.me/522311511435?text=Hola%20Kyto,%20necesito%20ayuda%20con%20mi%20pedido." target="_blank" class="fixed bottom-10 left-10 z-[100] bg-[#25D366] text-white px-8 py-4 rounded-full font-black flex items-center gap-4 shadow-2xl hover:scale-110 transition">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
        <span class="text-xs tracking-[2px]">AYUDA WHATSAPP</span>
    </a>

    <script>
        // --- BASE DE DATOS REAL (Basado en tus imágenes) ---
        const KYTO_MENU = {
            "Entradas": [
                {id:1, name:"Brochetas Queso Manchego", price:23, img:"https://images.unsplash.com/photo-1547516508-4c1f9c73a91e?w=500"},
                {id:2, name:"Eby Chesse Furay", price:35, img:"https://images.unsplash.com/photo-1558985250-27a406d64cb3?w=500"},
                {id:3, name:"Rollitos Primavera (5pzas)", price:110, img:"https://images.unsplash.com/photo-1544025162-d76694265947?w=500"}
            ],
            "Paquetes Especiales": [
                {id:4, name:"Mini Paquete Kyto", price:120, img:"https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=500"},
                {id:5, name:"Charola Kyto (6 Rollos)", price:890, img:"https://images.unsplash.com/photo-1583623025817-d180a2221d0a?w=500"},
                {id:6, name:"Paquete Familiar", price:420, img:"https://images.unsplash.com/photo-1553621042-f6e147245754?w=500"}
            ],
            "Rollos Favoritos": [
                {id:7, name:"Mar y Tierra Rol", price:215, img:"https://images.unsplash.com/photo-1559466273-d95e72debaf8?w=500"},
                {id:8, name:"Philadelphia Rol", price:105, img:"https://images.unsplash.com/photo-1617196034183-421b4917c92d?w=500"},
                {id:9, name:"California Rol", price:120, img:"https://images.unsplash.com/photo-1579584425555-c3ce17fd4111?w=500"}
            ]
        };

        let cart = [];

        // --- SISTEMA DE TIEMPO ---
        function updateClock() {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString('es-MX', {hour12:false});
        }
        setInterval(updateClock, 1000);

        // --- RENDER MENÚ ---
        function renderMenu() {
            const container = document.getElementById('dynamic-menu');
            let html = '';
            for(let cat in KYTO_MENU) {
                html += `
                <section>
                    <div class="flex items-center gap-6 mb-12">
                        <div class="h-[2px] w-20 bg-[#E31C24]"></div>
                        <h2 class="text-5xl font-black italic uppercase tracking-tighter">${cat}</h2>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                        ${KYTO_MENU[cat].map(p => `
                            <div class="kyto-item">
                                <div class="h-60 overflow-hidden relative">
                                    <img src="${p.img}" class="w-full h-full object-cover transition duration-700 hover:scale-110">
                                    <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10">
                                        <span class="text-[#E31C24] font-black italic">$${p.price}</span>
                                    </div>
                                </div>
                                <div class="p-8">
                                    <h3 class="text-lg font-black uppercase italic mb-6 tracking-tight leading-tight h-12">${p.name}</h3>
                                    <button onclick="addToCart(${p.id})" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-[4px] hover:bg-[#E31C24] hover:text-white transition-all active:scale-95">Añadir</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
            }
            container.innerHTML = html;
        }

        // --- LÓGICA CARRITO ---
        function addToCart(id) {
            let item;
            for(let cat in KYTO_MENU) {
                const found = KYTO_MENU[cat].find(x => x.id === id);
                if(found) item = found;
            }
            cart.push({...item, cartId: Date.now()});
            updateCartUI();
        }

        function removeFromCart(cid) {
            cart = cart.filter(x => x.cartId !== cid);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-badge').innerText = cart.length;
            const sub = cart.reduce((a, b) => a + b.price, 0);
            document.getElementById('sub-price').innerText = `$${sub}`;
            document.getElementById('total-price').innerText = `$${sub > 0 ? sub + 40 : 0}`;
            
            const list = document.getElementById('cart-list');
            if(cart.length === 0) {
                list.innerHTML = `<p class="text-center py-20 text-gray-700 font-bold uppercase tracking-widest">Tu bolsa está vacía</p>`;
                return;
            }
            list.innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-white/5 p-6 rounded-3xl border border-white/5">
                    <div>
                        <p class="font-black italic uppercase text-sm">${i.name}</p>
                        <p class="text-[#E31C24] font-black">$${i.price}</p>
                    </div>
                    <button onclick="removeFromCart(${i.cartId})" class="text-gray-600 hover:text-red-600 transition"><i class="fa-solid fa-trash-can text-xl"></i></button>
                </div>
            `).join('');
        }

        // --- MODALES ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function mockLogin() {
            alert("Acceso exitoso vía Nexo Cloud.");
            closeModal('modal-login');
        }

        function checkout() {
            const n = document.getElementById('cust-name').value;
            const a = document.getElementById('cust-address').value;
            if(!n || !a || cart.length === 0) return alert("Completa tus datos y añade productos.");
            
            let items = cart.map(i => `• ${i.name} ($${i.price})`).join('%0A');
            const sub = cart.reduce((a, b) => a + b.price, 0);
            const msg = `*NUEVO PEDIDO KYTO*%0A%0A*Cliente:* ${n}%0A*Dirección:* ${a}%0A%0A*Pedido:*%0A${items}%0A%0A*Subtotal:* $${sub}%0A*Envío Teziutlán:* $40%0A*TOTAL:* $${sub+40}%0A%0A_Enviado desde SushiKyto.com_`;
            window.open(`https://wa.me/522311511435?text=${msg}`);
        }

        // --- MINIJUEGO HDR ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, score = 0, pX = 150, items = [];

        function initGame() {
            const isMobile = window.innerWidth < 1024;
            const frame = document.getElementById('game-frame');
            if(isMobile) {
                frame.className = 'mobile-phone';
                canvas.width = 320; canvas.height = 650;
            } else {
                frame.className = 'pc-monitor';
                canvas.width = 850; canvas.height = 500;
            }
            openModal('modal-game');
            document.getElementById('game-over').classList.add('hidden');
            gameActive = true; score = 0; items = [];
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if(!gameActive) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);

            // Plato Player HDR
            ctx.fillStyle = '#eee';
            ctx.beginPath();
            ctx.ellipse(pX, canvas.height - 40, 50, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.stroke();

            // Spawn Sushi
            if(Math.random() < 0.04) items.push({x: Math.random()*canvas.width, y: 0});

            items.forEach((s, index) => {
                s.y += 6;
                // Dibujar Sushi Real
                ctx.fillStyle = 'white'; // Arroz
                ctx.fillRect(s.x-15, s.y-10, 30, 20);
                ctx.fillStyle = '#000'; // Alga
                ctx.fillRect(s.x-15, s.y-2, 30, 8);
                ctx.fillStyle = '#E31C24'; // Salmón
                ctx.fillRect(s.x-15, s.y-10, 30, 5);

                // Colisión
                if(s.y > canvas.height - 50 && s.x > pX - 55 && s.x < pX + 55) {
                    score++; items.splice(index, 1);
                } else if(s.y > canvas.height) {
                    gameActive = false;
                    document.getElementById('game-over').classList.remove('hidden');
                    document.getElementById('final-score').innerText = `Sushi Atrapado: ${score}`;
                }
            });

            ctx.fillStyle = 'white'; ctx.font = '900 30px Outfit'; ctx.textAlign = 'center';
            ctx.fillText(score, canvas.width/2, 60);
            if(gameActive) requestAnimationFrame(gameLoop);
        }

        function closeGame() { gameActive = false; closeModal('modal-game'); }

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            pX = e.clientX - rect.left;
        });
        canvas.addEventListener('touchmove', e => {
            const rect = canvas.getBoundingClientRect();
            pX = e.touches[0].clientX - rect.left;
            e.preventDefault();
        }, {passive: false});

        window.onload = renderMenu;
    </script>
</body>
</html>
