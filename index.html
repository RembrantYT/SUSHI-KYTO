<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUSHI-KYTO | NEXO EXPERIENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;900&display=swap');
        
        :root {
            --kyto-red: #E31C24;
            --nexo-blue: #007AFF;
            --nexo-green: #34C759;
            --apple-bg-light: #F5F5F7;
            --apple-bg-dark: #0D0D0D;
        }

        body { font-family: 'Outfit', sans-serif; transition: all 0.4s ease; overflow-x: hidden; }
        
        /* THEMES */
        body.dark-mode { background-color: var(--apple-bg-dark); color: white; }
        body.light-mode { background-color: var(--apple-bg-light); color: #1D1D1F; }

        /* CONTRASTE MODO CLARO CORREGIDO */
        body.light-mode .glass-card { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.1); color: #1D1D1F; }
        body.dark-mode .glass-card { background: rgba(20, 20, 20, 0.7); border: 1px solid rgba(255,255,255,0.05); color: white; }

        /* RELOJ NEXO IMPACTO */
        .nexo-clock-container { background: linear-gradient(90deg, var(--nexo-blue), var(--nexo-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; filter: drop-shadow(0 0 10px rgba(0,122,255,0.3)); }

        /* CELULAR NEXO (GAME HARDWARE) */
        .nexo-phone {
            width: 300px; height: 550px; border-radius: 45px; padding: 12px;
            background: linear-gradient(135deg, var(--nexo-blue) 0%, var(--nexo-green) 100%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; border: 4px solid rgba(255,255,255,0.2);
        }
        .phone-screen { background: black; width: 100%; height: 100%; border-radius: 35px; overflow: hidden; position: relative; }

        /* ANIMACIONES APPLE */
        .apple-slide { animation: appleSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1) both; }
        @keyframes appleSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* BOTÓN FLOTANTE WHATSAPP */
        .wa-float { position: fixed; bottom: 30px; left: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; items-center: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 999; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="dark-mode">

    <div class="fixed top-0 w-full z-[200] p-6 flex justify-center items-center backdrop-blur-xl">
        <div class="text-center">
            <div id="big-clock" class="text-5xl md:text-7xl nexo-clock-container tracking-tighter">00:00</div>
            <div class="text-[9px] font-black uppercase tracking-[5px] opacity-60">Reloj importado por el Equipo NEXO</div>
        </div>
    </div>

    <nav class="fixed top-28 w-full z-[150] px-10">
        <div class="container mx-auto flex justify-between items-center glass-card p-4 rounded-[2rem]">
            <div class="text-2xl font-black italic">KYTO<span class="text-red-600">.</span></div>
            
            <div class="flex items-center gap-6">
                <button onclick="toggleTheme()" class="text-xl"><i id="t-icon" class="fa-solid fa-sun"></i></button>
                
                <div id="auth-box">
                    <button onclick="mockGoogleLogin()" class="flex items-center gap-2 bg-white text-black px-5 py-2 rounded-full font-bold text-xs">
                        <img src="https://www.google.com/favicon.ico" class="w-3"> Google
                    </button>
                </div>

                <div id="user-pill" class="hidden flex items-center gap-3 bg-red-600/10 p-1 pr-4 rounded-full border border-red-600/20 cursor-pointer" onclick="openProfile()">
                    <img id="u-img" src="" class="w-8 h-8 rounded-full border-2 border-red-600">
                    <span id="u-name" class="text-[10px] font-bold">Iniciando...</span>
                </div>

                <button onclick="toggleCart()" class="relative text-xl">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 pt-72 pb-40">
        
        <section class="mb-20 apple-slide">
            <h2 class="text-4xl font-black mb-10 italic uppercase tracking-tighter">セット Paquetes Especiales</h2>
            <div id="paquetes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </section>

        <section class="mb-20 apple-slide">
            <h2 class="text-4xl font-black mb-10 italic uppercase tracking-tighter">巻き寿司 Los Rollos</h2>
            <div id="rollos-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </section>
    </main>

    <a href="https://wa.me/522311511435?text=Hola!%20Vengo%20desde%20el%20sitio%20web%20Kyto,%20tengo%20una%20duda." target="_blank" class="wa-float">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <div id="game-modal" class="fixed inset-0 z-[500] hidden items-center justify-center bg-black/90 backdrop-blur-md p-6">
        <div class="nexo-phone">
            <div class="phone-screen">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-black rounded-b-2xl z-20"></div>
                
                <canvas id="gameCanvas" width="276" height="526"></canvas>
                
                <div id="game-over" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center text-center p-6">
                    <h3 class="text-4xl font-black text-red-600 mb-2">GAME OVER</h3>
                    <p class="text-white text-xs mb-8 font-bold">¡Sensei, se te cayó el sushi!</p>
                    <button onclick="startGame()" class="bg-white text-black px-10 py-3 rounded-full font-black text-xs uppercase">Reintentar</button>
                </div>

                <div id="score-ui" class="absolute bottom-10 left-0 w-full text-center text-white font-black italic">
                    Puntos: 0
                </div>
            </div>
            <button onclick="toggleGame()" class="absolute -bottom-16 left-1/2 -translate-x-1/2 text-gray-500 font-bold uppercase text-[10px] tracking-widest">Cerrar Celular NEXO</button>
        </div>
    </div>

    <div onclick="toggleGame()" class="fixed bottom-10 right-10 z-[250] cursor-pointer hover:scale-110 transition active:scale-90">
        <div class="bg-gradient-to-br from-yellow-400 to-yellow-700 w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border-4 border-white/20">
            <i class="fa-solid fa-cat text-5xl text-yellow-900"></i>
            <div class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-black p-2 rounded-full">JUGAR</div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed inset-y-0 right-[-100%] w-full md:w-[500px] glass-card z-[300] shadow-2xl transition-all duration-700 flex flex-col">
        <div class="p-8 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-3xl font-black italic uppercase">Tu Bolsa</h2>
            <button onclick="toggleCart()" class="text-4xl">&times;</button>
        </div>

        <div class="flex-grow overflow-y-auto p-8 no-scrollbar">
            <div id="cart-items" class="space-y-4 mb-10"></div>
            
            <div id="shipping-section" class="space-y-6 pt-6 border-t border-white/10">
                <h3 class="text-xs font-black text-red-600 uppercase tracking-widest">Información de Entrega</h3>
                <div class="space-y-4">
                    <input type="text" id="cust-name" placeholder="Nombre completo" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 transition">
                    <input type="tel" id="cust-phone" placeholder="Número de Celular" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 transition">
                    <textarea id="cust-dir" placeholder="Dirección en Teziutlán" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 transition" rows="3"></textarea>
                    
                    <div class="space-y-2">
                        <p class="text-[10px] font-bold text-gray-500 uppercase ml-2">Método de Pago</p>
                        <select id="cust-pay" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none text-sm appearance-none">
                            <option class="bg-black" value="Efectivo">Efectivo al recibir</option>
                            <option class="bg-black" value="Transferencia">Transferencia</option>
                            <option class="bg-black" value="Terminal">Terminal con repartidor</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-8 border-t border-white/10 bg-black/20">
            <div class="flex justify-between text-3xl font-black italic mb-6">
                <span>Total:</span>
                <span id="final-total">$0</span>
            </div>
            <button id="buy-btn" onclick="processOrder()" class="w-full bg-red-600 py-6 rounded-[2rem] font-black uppercase tracking-widest text-lg shadow-xl shadow-red-900/40">Pedir a Domicilio</button>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 z-[600] hidden flex items-center justify-center p-6 bg-black/90">
        <div class="glass-card w-full max-w-md rounded-[3rem] overflow-hidden">
            <div class="p-10 text-center bg-gradient-to-b from-red-600/10 to-transparent">
                <img id="p-img" class="w-24 h-24 rounded-full mx-auto border-4 border-red-600 mb-4" src="">
                <h3 id="p-name" class="text-2xl font-black italic">Usuario</h3>
            </div>
            <div class="p-8 space-y-4">
                <div class="bg-white/5 p-5 rounded-2xl">
                    <p class="text-[10px] font-black text-red-600 uppercase">Mis Pedidos Recientes</p>
                    <div id="p-history" class="text-xs mt-4 space-y-2">Sin pedidos aún.</div>
                </div>
                <button onclick="logout()" class="w-full bg-white/5 py-4 rounded-xl font-bold uppercase text-[10px]">Cerrar Sesión</button>
                <button onclick="openProfile()" class="w-full text-xs font-bold text-gray-500">Volver al Menú</button>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS MASIVA (MAPEADA A TUS IMÁGENES) ---
        const DATABASE = {
            paquetes: [
                {id: 1, name: "Mini Paquete", price: 120, img: "21653.png", desc: "Roll Empanizado + Brocheta + Pasta/Arroz"},
                {id: 2, name: "Kyto Box", price: 530, img: "21654.png", desc: "3 Rollos + Yakimeshi + Brochetas + Onigiris"},
                {id: 3, name: "Paquete 2 Personas", price: 340, img: "21655.png", desc: "2 Rollos Especiales + Entradas + Bebida"},
                {id: 4, name: "Kyto Party", price: 850, img: "21656.png", desc: "5 Rollos a elegir + Charola de Entradas"},
                {id: 5, name: "Set Familiar", price: 420, img: "21657.png", desc: "4 Rollos clásicos + Arroz Familiar"}
            ],
            rollos: [
                {id: 101, name: "Avocado Roll", price: 120, desc: "Láminas de aguacate por fuera"},
                {id: 102, name: "Filadelfia Roll", price: 105, desc: "Queso Crema y Salmón"},
                {id: 103, name: "Hannibal Roll", price: 250, desc: "Especialidad Premium Arrachera"},
                {id: 104, name: "Mar y Tierra", price: 215, desc: "Res, Camarón y Queso"},
                {id: 105, name: "Eby Furay", price: 145, desc: "Camarón empanizado por fuera"},
                {id: 106, name: "Dragon Roll", price: 180, desc: "Anguila y Aguacate"},
                {id: 107, name: "California", price: 105, desc: "Pepino, Cangrejo y Queso"},
                {id: 108, name: "Tampico Especial", price: 110, desc: "Topping de salsa tampico"},
                {id: 109, name: "Nexo Roll", price: 230, desc: "Roll de autor inspirado en el equipo"},
                {id: 110, name: "Spicy Tuna", price: 160, desc: "Atún fresco con salsa picante"}
            ]
        };

        let cart = [];
        let currentUser = null;

        // --- INICIAR ---
        function init() {
            renderMenu();
            setInterval(updateClock, 1000);
            updateClock();
        }

        // --- RELOJ GIGANTE ---
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('big-clock').innerText = time;
        }

        // --- RENDERIZADO ---
        function renderMenu() {
            const pCont = document.getElementById('paquetes-container');
            const rCont = document.getElementById('rollos-container');

            pCont.innerHTML = DATABASE.paquetes.map(p => `
                <div class="glass-card p-6 rounded-[3rem] hover:border-red-600 transition group relative overflow-hidden">
                    <img src="fotos/${p.img}" class="w-full h-48 object-cover rounded-[2rem] mb-6 group-hover:scale-105 transition">
                    <h3 class="text-2xl font-black italic uppercase">${p.name}</h3>
                    <p class="text-[10px] text-gray-500 font-bold uppercase mt-2">${p.desc}</p>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-3xl font-black text-red-600">$${p.price}</span>
                        <button onclick="addToCart('${p.name}', ${p.price})" class="bg-red-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            `).join('');

            rCont.innerHTML = DATABASE.rollos.map(r => `
                <div class="glass-card p-4 rounded-3xl flex flex-col justify-between hover:bg-white/5 transition">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="font-black text-[11px] uppercase italic">${r.name}</h4>
                            <span class="text-red-600 font-black text-xs">$${r.price}</span>
                        </div>
                        <p class="text-[9px] text-gray-500 leading-tight">${r.desc}</p>
                    </div>
                    <button onclick="addToCart('${r.name}', ${r.price})" class="mt-4 bg-white/5 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-red-600 transition">Añadir</button>
                </div>
            `).join('');
        }

        // --- CARRITO ---
        function addToCart(name, price) {
            cart.push({id: Date.now(), name, price});
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const total = document.getElementById('final-total');
            document.getElementById('cart-count').innerText = cart.length;
            
            const sub = cart.reduce((acc, i) => acc + i.price, 0);
            total.innerText = `$${sub > 0 ? sub + 40 : 0}`;

            list.innerHTML = cart.map(i => `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div><p class="font-bold text-xs uppercase">${i.name}</p><p class="text-red-600 font-black text-sm">$${i.price}</p></div>
                    <button onclick="removeFromCart(${i.id})" class="text-gray-500 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function toggleCart() {
            const side = document.getElementById('cart-sidebar');
            side.style.right = side.style.right === "0px" ? "-100%" : "0px";
        }

        // --- AUTH GOOGLE REAL MOCK ---
        function mockGoogleLogin() {
            // Simulamos el evento de inicio de sesión real
            currentUser = {
                name: "Cliente Nexo",
                img: "https://ui-avatars.com/api/?name=Cliente+Nexo&background=007AFF&color=fff&bold=true"
            };
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('user-pill').classList.remove('hidden');
            document.getElementById('u-img').src = currentUser.img;
            document.getElementById('u-name').innerText = currentUser.name;
            document.getElementById('cust-name').value = currentUser.name;
        }

        function logout() {
            currentUser = null;
            location.reload();
        }

        function openProfile() {
            const modal = document.getElementById('profile-modal');
            if(modal.classList.contains('hidden')) {
                document.getElementById('p-img').src = currentUser.img;
                document.getElementById('p-name').innerText = currentUser.name;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        // --- TEMA ---
        function toggleTheme() {
            const b = document.body;
            const icon = document.getElementById('t-icon');
            if(b.classList.contains('dark-mode')) {
                b.classList.replace('dark-mode', 'light-mode');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                b.classList.replace('light-mode', 'dark-mode');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        // --- GAME LOGIC (NEKO SENSEI) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameOn = false, score = 0, level = 1, speed = 2, playerX = 138, sushis = [];

        function toggleGame() {
            gameOn = !gameOn;
            document.getElementById('game-modal').classList.toggle('hidden');
            if(gameOn) startGame();
        }

        function startGame() {
            score = 0; level = 1; speed = 2; sushis = [];
            document.getElementById('game-over').classList.add('hidden');
            gameLoop();
        }

        function gameLoop() {
            if(!gameOn) return;
            ctx.clearRect(0, 0, 276, 526);
            
            // Dificultad Dinámica
            level = Math.floor(score / 5) + 1;
            speed = 2 + (level * 0.5);
            document.getElementById('score-ui').innerText = `PTS: ${score} | LV: ${level}`;

            // Player (Gatito)
            ctx.fillStyle = "white";
            ctx.roundRect(playerX - 25, 480, 50, 10, 5);
            ctx.fill();

            // Spawn Sushi
            if(Math.random() < 0.03 * level) sushis.push({x: Math.random()*250, y: 0});

            sushis.forEach((s, i) => {
                s.y += speed;
                ctx.fillStyle = "#E31C24";
                ctx.beginPath();
                ctx.arc(s.x, s.y, 10, 0, Math.PI*2);
                ctx.fill();

                // Colisión
                if(s.y > 480 && s.x > playerX - 30 && s.x < playerX + 30) {
                    score++;
                    sushis.splice(i, 1);
                }
                
                // GAME OVER: Si toca el suelo
                if(s.y > 526) {
                    gameOn = false;
                    document.getElementById('game-over').classList.remove('hidden');
                }
            });

            if(gameOn) requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousemove', (e) => playerX = e.clientX - canvas.getBoundingClientRect().left);
        canvas.addEventListener('touchmove', (e) => {
            playerX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            e.preventDefault();
        });

        // --- ORDEN FINAL ---
        function processOrder() {
            if(cart.length === 0) return alert("Bolsa vacía");
            const name = document.getElementById('cust-name').value;
            const dir = document.getElementById('cust-dir').value;
            if(!name || !dir) return alert("Llena tus datos de entrega.");

            alert("¡Pedido enviado a Sushi-Kyto! El repartidor se pondrá en contacto pronto.");
            cart = [];
            updateCartUI();
            toggleCart();
        }

        init();
    </script>
</body>
</html>
