<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUSHI-KYTO | POWERED BY NEXO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;900&display=swap');
        
        :root {
            --kyto-red: #E31C24;
            --gold: #FFD700;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #000; 
            color: white; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* FONDO ANIMADO TIPO GIF */
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1579871494447-9811cf80d66c?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: kenBurns 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) rotate(1deg); }
        }

        /* PETALOS */
        .petalo {
            position: fixed; top: -10%; background: #ffb7c5;
            border-radius: 10px 0 10px 10px; opacity: 0.6;
            animation: caer linear infinite; z-index: 1; pointer-events: none;
        }
        @keyframes caer {
            0% { transform: translateY(0vh) translateX(0px) rotate(0deg); }
            100% { transform: translateY(110vh) translateX(150px) rotate(720deg); }
        }

        /* RELOJ EXCLUSIVO NEXO */
        .reloj-nexo {
            position: absolute; top: 30px; right: 30px;
            z-index: 200; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px 35px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }
        .reloj-txt { font-weight: 900; font-size: 2.2rem; color: white; display: block; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
        .reloj-sub { font-size: 9px; text-transform: uppercase; letter-spacing: 4px; color: var(--kyto-red); font-weight: 900; display: block; }
        .reloj-import { font-size: 7px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.4); margin-top: 5px; display: block; }

        /* GATO MANEKI-NEKO ULTRA CUTE & GLOSSY */
        .maneki-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 500;
            cursor: pointer; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .maneki-container:hover { transform: scale(1.1) translateY(-10px); }
        
        .wave-arm {
            animation: wave 1.5s ease-in-out infinite alternate;
            transform-origin: 140px 100px;
        }
        @keyframes wave {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(25deg); }
        }

        /* BOTÓN WHATSAPP AYUDA */
        .btn-ws {
            position: fixed; bottom: 30px; left: 30px; z-index: 500;
            background: #25D366; color: white; width: 65px; height: 65px;
            border-radius: 22px; display: flex; items-center; justify-content: center;
            font-size: 30px; box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }
        .btn-ws:hover { transform: scale(1.1) rotate(10deg); }

        /* HARDWARE ADAPTATIVO */
        .pc-case {
            width: 800px; height: 550px; background: #111; border: 12px solid #222;
            border-radius: 15px; position: relative; box-shadow: 0 0 100px rgba(0,0,0,1);
            outline: 2px solid rgba(255,255,255,0.05);
        }
        .phone-case {
            width: 320px; height: 650px; background: #050505; border: 10px solid #1a1a1a;
            border-radius: 50px; position: relative; box-shadow: 0 0 80px rgba(0,0,0,1);
        }

        /* CARTAS DE PRODUCTO */
        .kyto-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .kyto-card:hover { transform: translateY(-20px); border-color: var(--kyto-red); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

    <div class="bg-animated"></div>
    <div id="pétalos-container"></div>

    <div class="reloj-nexo">
        <span id="reloj-h" class="reloj-txt">00:00:00</span>
        <span class="reloj-sub">Kyto Official Time</span>
        <span class="reloj-import">Reloj importado por NEXO</span>
    </div>

    <a href="https://wa.me/522311511435" target="_blank" class="btn-ws">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <nav class="absolute top-[140px] w-full z-[150] px-8">
        <div class="container mx-auto flex justify-between items-center bg-black/40 backdrop-blur-3xl p-8 rounded-[3.5rem] border border-white/10">
            <div>
                <h1 class="text-5xl font-black italic uppercase tracking-tighter">Sushi Kyto</h1>
                <p class="text-[10px] font-black tracking-[5px] text-gray-500 mt-1 uppercase">Delivery System v3.0</p>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="verBolsa()" class="relative bg-white text-black w-20 h-20 rounded-[2rem] flex items-center justify-center transition active:scale-90 shadow-2xl">
                    <i class="fa-solid fa-cart-shopping text-2xl"></i>
                    <span id="badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-[12px] font-black w-8 h-8 flex items-center justify-center rounded-full border-4 border-black">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 pt-[480px] pb-48 relative z-10">
        <section class="mb-40">
            <h2 class="text-7xl font-black italic uppercase mb-20 tracking-tighter"><span class="text-red-600 opacity-50">#01</span> Entradas</h2>
            <div id="cat-entradas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </section>

        <section class="mb-40">
            <h2 class="text-7xl font-black italic uppercase mb-20 tracking-tighter"><span class="text-red-600 opacity-50">#02</span> Paquetes Especiales</h2>
            <div id="cat-paquetes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </section>

        <section class="mb-40">
            <h2 class="text-7xl font-black italic uppercase mb-20 tracking-tighter"><span class="text-red-600 opacity-50">#03</span> Rollos del Chef</h2>
            <div id="cat-rollos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>
    </main>

    <div class="maneki-container" onclick="abrirJuego()">
        <svg width="130" height="130" viewBox="0 0 200 200">
            <defs>
                <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff" />
                    <stop offset="100%" style="stop-color:#e0e0e0" />
                </linearGradient>
                <filter id="shadow">
                    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
                </filter>
            </defs>
            <ellipse cx="100" cy="140" rx="60" ry="50" fill="url(#bodyGrad)" />
            <circle cx="100" cy="85" r="48" fill="url(#bodyGrad)" />
            <path d="M60 50 L40 10 L85 45 Z" fill="#fff" filter="url(#shadow)" />
            <path d="M140 50 L160 10 L115 45 Z" fill="#fff" filter="url(#shadow)" />
            <path d="M55 45 L48 20 L75 40 Z" fill="#ffb7c5" />
            <path d="M145 45 L152 20 L125 40 Z" fill="#ffb7c5" />
            <circle cx="80" cy="85" r="8" fill="#1a1a1a" />
            <circle cx="120" cy="85" r="8" fill="#1a1a1a" />
            <circle cx="77" cy="82" r="3" fill="#fff" />
            <circle cx="117" cy="82" r="3" fill="#fff" />
            <circle cx="70" cy="100" r="6" fill="#ffb7c5" opacity="0.5" />
            <circle cx="130" cy="100" r="6" fill="#ffb7c5" opacity="0.5" />
            <path d="M95 95 Q100 100 105 95" fill="none" stroke="#1a1a1a" stroke-width="2" />
            <g class="wave-arm">
                <path d="M135 90 Q175 60 155 40 Q130 25 130 80 Z" fill="#fff" filter="url(#shadow)" />
                <path d="M140 50 Q150 45 155 55" fill="none" stroke="#ffb7c5" stroke-width="3" />
            </g>
            <circle cx="100" cy="145" r="22" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
            <text x="92" y="153" font-family="Arial" font-size="22" fill="#B8860B" font-weight="900">¥</text>
        </svg>
    </div>

    <div id="juego-box" class="fixed inset-0 z-[600] hidden flex flex-col items-center justify-center bg-black/98 backdrop-blur-3xl">
        <div id="hw-container">
            <div id="game-screen" class="relative">
                <canvas id="canvasGame"></canvas>
                <div id="game-over" class="absolute inset-0 bg-black/90 hidden flex flex-col items-center justify-center text-center">
                    <h2 class="text-6xl font-black text-red-600 mb-4 italic">DERROTADO</h2>
                    <p id="final-score" class="text-2xl font-bold mb-10 text-white"></p>
                    <button onclick="resetGame()" class="bg-red-600 text-white px-12 py-5 rounded-full font-black uppercase text-xs tracking-widest shadow-2xl">Reiniciar Computadora</button>
                </div>
            </div>
        </div>
        <button onclick="abrirJuego()" class="mt-12 text-white font-black uppercase tracking-[10px] text-[10px] opacity-30 hover:opacity-100 transition">Desconectarse</button>
    </div>

    <div id="bolsa-side" class="fixed inset-y-0 right-[-100%] w-full md:w-[600px] bg-black/95 z-[500] border-l border-white/10 transition-all duration-500 flex flex-col backdrop-blur-2xl">
        <div class="p-12 border-b border-white/10">
            <div class="flex justify-between items-center">
                <h2 class="text-6xl font-black italic uppercase leading-none">Tu Bolsa</h2>
                <button onclick="verBolsa()" class="text-5xl">&times;</button>
            </div>
            <p class="text-red-600 font-black text-[10px] tracking-[5px] mt-4 uppercase">Verifica tu pedido</p>
        </div>

        <div class="flex-grow overflow-y-auto p-12 no-scrollbar" id="lista-bolsa"></div>

        <div class="p-12 border-t border-white/10 bg-white/5 space-y-6">
            <div class="space-y-2 border-b border-white/5 pb-6">
                <div class="flex justify-between text-gray-400 font-bold uppercase text-xs">
                    <span>Subtotal:</span>
                    <span id="subtotal-txt">$0</span>
                </div>
                <div class="flex justify-between text-red-600 font-black uppercase text-xs">
                    <span>Servicio a Domicilio (Teziutlán):</span>
                    <span>$40</span>
                </div>
            </div>

            <div class="flex justify-between items-center py-4">
                <span class="font-black italic text-4xl uppercase">Total:</span>
                <span id="total-txt" class="text-6xl font-black text-white">$0</span>
            </div>

            <div class="space-y-4">
                <input type="text" id="dir-envio" placeholder="DIRECCIÓN Y TELÉFONO" class="w-full bg-black/50 border border-white/10 p-6 rounded-3xl font-bold uppercase text-xs focus:border-red-600 outline-none">
                <button onclick="finalizarPedido()" class="w-full bg-red-600 py-8 rounded-[2.5rem] font-black uppercase tracking-[5px] text-sm hover:bg-red-700 transition shadow-2xl">Confirmar por WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const MENU_REAL = {
            entradas: [
                {id: 1, name: "Brochetas de Queso", price: 65, img: "21659.png"},
                {id: 2, name: "Yakimeshi Especial", price: 95, img: "21660.png"},
                {id: 3, name: "Kushiages Mixtos", price: 85, img: "21661.png"},
                {id: 4, name: "Edamames", price: 75, img: "21670.png"},
                {id: 5, name: "Gyoza de Cerdo", price: 110, img: "21671.png"}
            ],
            paquetes: [
                {id: 10, name: "Mini Paquete", price: 120, img: "21653.png"},
                {id: 11, name: "Kyto Box", price: 530, img: "21654.png"},
                {id: 12, name: "Paquete Dúo", price: 340, img: "21655.png"},
                {id: 13, name: "Charola Kyto", price: 890, img: "21656.png"},
                {id: 14, name: "Paquete Familiar", price: 650, img: "21672.png"}
            ],
            rollos: [
                {id: 100, name: "Philadelfia Roll", price: 105, img: "21662.png"},
                {id: 101, name: "Avocado Roll", price: 120, img: "21663.png"},
                {id: 102, name: "Mar y Tierra Roll", price: 215, img: "21664.png"},
                {id: 103, name: "Hannibal Roll", price: 250, img: "21665.png"},
                {id: 104, name: "Eby Furay Roll", price: 145, img: "21666.png"},
                {id: 105, name: "California Roll", price: 105, img: "21667.png"},
                {id: 106, name: "Dragon Roll", price: 180, img: "21668.png"},
                {id: 107, name: "Tampico Especial", price: 110, img: "21669.png"},
                {id: 108, name: "Spicy Tuna Roll", price: 165, img: "21673.png"},
                {id: 109, name: "Salmon Skin Roll", price: 155, img: "21674.png"},
                {id: 110, name: "Rainbow Roll", price: 230, img: "21675.png"},
                {id: 111, name: "Veggie Fresh Roll", price: 95, img: "21676.png"}
            ]
        };

        let bolsa = [];

        // RELOJ
        function updateClock() {
            const now = new Date();
            document.getElementById('reloj-h').innerText = now.toLocaleTimeString('es-MX', {hour12:false});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // PETALOS
        setInterval(() => {
            const p = document.createElement('div');
            p.className = 'petalo';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = Math.random() * 10 + 10 + 'px';
            p.style.animationDuration = Math.random() * 4 + 4 + 's';
            document.getElementById('pétalos-container').appendChild(p);
            setTimeout(() => p.remove(), 8000);
        }, 600);

        // RENDER
        function renderMenu() {
            ['entradas', 'paquetes', 'rollos'].forEach(cat => {
                document.getElementById(`cat-${cat}`).innerHTML = MENU_REAL[cat].map(i => `
                    <div class="kyto-card">
                        <div class="h-64 bg-zinc-900 overflow-hidden relative">
                            <img src="fotos/${i.img}" class="w-full h-full object-cover">
                            <div class="absolute top-4 right-4 bg-black/80 px-4 py-2 rounded-xl border border-white/10 font-black text-red-600">$${i.price}</div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-xl font-black uppercase italic mb-6">${i.name}</h3>
                            <button onclick="add(${i.id}, '${cat}')" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-[9px] tracking-[3px] hover:bg-red-600 hover:text-white transition">Agregar</button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function add(id, cat) {
            const item = MENU_REAL[cat].find(i => i.id === id);
            bolsa.push({...item, bid: Date.now()});
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('lista-bolsa');
            document.getElementById('badge').innerText = bolsa.length;
            const sub = bolsa.reduce((a, b) => a + b.price, 0);
            document.getElementById('subtotal-txt').innerText = `$${sub}`;
            document.getElementById('total-txt').innerText = `$${sub > 0 ? sub + 40 : 0}`;

            list.innerHTML = bolsa.map(i => `
                <div class="flex justify-between items-center bg-white/5 p-6 rounded-[2rem] mb-4">
                    <div>
                        <p class="font-black uppercase text-xs">${i.name}</p>
                        <p class="text-red-600 font-black">$${i.price}</p>
                    </div>
                    <button onclick="remove(${i.bid})" class="text-zinc-600 hover:text-red-600 text-xl"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function remove(bid) {
            bolsa = bolsa.filter(i => i.bid !== bid);
            updateUI();
        }

        function verBolsa() {
            const s = document.getElementById('bolsa-side');
            s.style.right = s.style.right === "0px" ? "-100%" : "0px";
        }

        function finalizarPedido() {
            if(bolsa.length === 0) return alert("Bolsa vacía.");
            const dir = document.getElementById('dir-envio').value;
            if(!dir) return alert("Ingresa tu dirección.");

            let itemsTxt = "";
            let sub = 0;
            const counts = {};
            bolsa.forEach(x => counts[x.name] = (counts[x.name] || 0) + 1);
            
            Object.keys(counts).forEach(n => {
                const item = bolsa.find(b => b.name === n);
                itemsTxt += `• *${counts[n]}x* ${n} ($${item.price * counts[n]})%0A`;
                sub += item.price * counts[n];
            });

            const total = sub + 40;
            const msg = `🍣 *NUEVO PEDIDO KYTO WEB*%0A%0A📍 *Dirección:* ${dir}%0A%0A🍱 *DETALLE:*%0A${itemsTxt}%0A💰 *Subtotal:* $${sub}%0A🚚 *Envío Teziutlán:* $40%0A🔥 *TOTAL A PAGAR:* $${total}%0A%0A---%0A_Pedido realizado desde el sitio web_`;
            window.open(`https://wa.me/522311511435?text=${msg}`, '_blank');
        }

        // JUEGO
        const canvas = document.getElementById('canvasGame');
        const ctx = canvas.getContext('2d');
        let playing = false, score = 0, pX = 150, items = [];

        function abrirJuego() {
            const isMobile = window.innerWidth < 768;
            const hw = document.getElementById('hw-container');
            if(isMobile) {
                hw.className = "phone-case";
                canvas.width = 300; canvas.height = 630;
            } else {
                hw.className = "pc-case";
                canvas.width = 776; canvas.height = 526;
            }
            playing = !playing;
            document.getElementById('juego-box').classList.toggle('hidden');
            if(playing) resetGame();
        }

        function resetGame() {
            score = 0; items = []; playing = true;
            document.getElementById('game-over').classList.add('hidden');
            gameLoop();
        }

        function gameLoop() {
            if(!playing) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#E31C24";
            ctx.beginPath(); ctx.roundRect(pX - 50, canvas.height - 40, 100, 15, 10); ctx.fill();
            
            if(Math.random() < 0.04) items.push({x: Math.random()*canvas.width, y: 0});

            items.forEach((s, i) => {
                s.y += 7;
                ctx.fillStyle = "white"; ctx.fillRect(s.x-15, s.y-10, 30, 20);
                if(s.y > canvas.height - 50 && s.x > pX - 60 && s.x < pX + 60) {
                    score++; items.splice(i, 1);
                }
                if(s.y > canvas.height) {
                    playing = false;
                    document.getElementById('final-score').innerText = `Puntaje: ${score}`;
                    document.getElementById('game-over').classList.remove('hidden');
                }
            });
            ctx.fillStyle = "white"; ctx.font = "900 30px Outfit"; ctx.fillText(score, 20, 50);
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousemove', e => pX = e.clientX - canvas.getBoundingClientRect().left);
        canvas.addEventListener('touchmove', e => {
            pX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            e.preventDefault();
        }, {passive: false});

        renderMenu();
    </script>
</body>
</html>
