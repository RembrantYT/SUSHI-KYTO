<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUSHI KYTO | NEXO PRO PLATFORM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        
        :root { --kyto-red: #E31C24; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* FONDO DINÁMICO MEJORADO */
        .bg-fixed-hdr {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1553621042-f6e147245754?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center; z-index: -2;
        }

        .sakura-bg {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1; z-index: -1;
        }

        /* RELOJ NEXO */
        .nexo-clock {
            position: fixed; top: 20px; right: 20px; z-index: 500;
            background: rgba(20,20,20,0.8); backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            text-align: right;
        }
        #time-txt { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; display: block; }
        .nexo-tag { font-size: 8px; color: var(--kyto-red); font-weight: 900; letter-spacing: 2px; }

        /* CARDS */
        .product-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px; transition: all 0.4s ease; overflow: hidden;
        }
        .product-card:hover { transform: translateY(-10px); border-color: var(--kyto-red); background: rgba(255,255,255,0.05); }

        /* RESPONSIVE AJUSTES */
        @media (max-width: 768px) {
            .nexo-clock { top: 10px; right: 10px; padding: 5px 15px; }
            #time-txt { font-size: 1.1rem; }
            .header-title { font-size: 2.5rem !important; }
        }

        /* GATO */
        .cat-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 400;
            cursor: pointer; transition: transform 0.3s ease;
        }
        .cat-btn:hover { transform: scale(1.1) rotate(-5deg); }

        /* MODALES */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); z-index: 1000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        /* HARDWARE SIMULATOR */
        .pc-frame { width: 800px; height: 500px; border: 12px solid #333; border-radius: 15px; background: #000; }
        .mobile-frame { width: 320px; height: 600px; border: 8px solid #222; border-radius: 40px; background: #000; }
    </style>
</head>
<body>

    <div class="bg-fixed-hdr"></div>
    <div class="sakura-bg"></div>

    <div class="nexo-clock">
        <span id="time-txt">00:00:00</span>
        <span class="nexo-tag">NEXO PRO TIME</span>
    </div>

    <a href="https://wa.me/522311511435?text=Hola%20Kyto,%20necesito%20ayuda%20con%20mi%20pedido." target="_blank" 
       class="fixed bottom-6 left-6 z-[500] bg-[#25D366] text-white px-6 py-3 rounded-full flex items-center gap-3 font-black shadow-2xl hover:scale-110 transition">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
        <span class="text-xs tracking-widest">AYUDA WHATSAPP</span>
    </a>

    <nav class="container mx-auto px-6 py-8 flex justify-between items-center relative z-10">
        <div>
            <h1 class="header-title text-6xl font-black italic uppercase tracking-tighter">Sushi Kyto</h1>
            <p class="text-[10px] tracking-[5px] text-red-600 font-bold">PLATAFORMA PROFESIONAL</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleProfile()" id="profile-btn" class="bg-white/10 hover:bg-white/20 p-4 rounded-2xl border border-white/10 transition">
                <i class="fa-solid fa-user-ninja text-xl"></i>
            </button>
            <button onclick="toggleCart()" class="relative bg-white text-black px-6 py-4 rounded-2xl font-black transition active:scale-90">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-6 h-6 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20 relative z-10">
        <div id="menu-container" class="space-y-20">
            </div>
    </main>

    <div class="cat-btn" onclick="startMiniGame()">
        <svg width="80" height="80" viewBox="0 0 200 200">
            <circle cx="100" cy="140" r="50" fill="white"/>
            <circle cx="100" cy="80" r="40" fill="white"/>
            <circle cx="80" cy="75" r="5" fill="black"/>
            <circle cx="120" cy="75" r="5" fill="black"/>
            <path d="M100 130 Q150 100 140 80" stroke="white" stroke-width="10" fill="none" class="animate-pulse"/>
            <circle cx="100" cy="140" r="15" fill="gold"/>
        </svg>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="bg-zinc-950 w-full max-w-md p-10 rounded-[3rem] border border-white/10 text-center">
            <i class="fa-solid fa-circle-user text-7xl text-red-600 mb-6"></i>
            <h2 class="text-3xl font-black uppercase mb-2">Bienvenido Ninja</h2>
            <p class="text-gray-500 text-sm mb-8">Accede para guardar tus direcciones</p>
            <button onclick="loginSim()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-widest mb-4">Login con Google</button>
            <button onclick="toggleProfile()" class="text-xs text-gray-600 font-bold uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <div id="cart-modal" class="modal-overlay">
        <div class="bg-zinc-950 w-full max-w-2xl p-8 rounded-[3rem] border border-white/10 flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black italic uppercase">Tu Bolsa</h2>
                <button onclick="toggleCart()" class="text-3xl">&times;</button>
            </div>
            
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8 pr-2"></div>

            <div class="border-t border-white/10 pt-6 space-y-4">
                <div class="flex justify-between text-gray-500 font-bold uppercase text-xs">
                    <span>Subtotal</span>
                    <span id="subtotal-val">$0</span>
                </div>
                <div class="flex justify-between text-red-600 font-black uppercase text-xs">
                    <span>Envío Teziutlán</span>
                    <span>$40</span>
                </div>
                <div class="flex justify-between text-3xl font-black">
                    <span>TOTAL</span>
                    <span id="total-val">$0</span>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="order-name" placeholder="Tu Nombre" class="bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-red-600">
                    <input type="text" id="order-dir" placeholder="Dirección Exacta" class="bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-red-600">
                    <button onclick="sendWhatsApp()" class="bg-red-600 py-6 rounded-2xl font-black uppercase tracking-widest hover:bg-red-700 transition">Confirmar Pedido</button>
                </div>
            </div>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay">
        <div id="hw-frame" class="relative">
            <canvas id="gameCanvas"></canvas>
            <div id="game-ui" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 hidden">
                <h2 class="text-4xl font-black text-red-600 mb-4">GAME OVER</h2>
                <button onclick="startMiniGame()" class="bg-white text-black px-8 py-3 rounded-full font-black">REINTENTAR</button>
            </div>
        </div>
        <button onclick="closeGame()" class="fixed top-10 right-10 text-white text-4xl">&times;</button>
    </div>

    <script>
        const MENU = {
            "Entradas": [
                {id:1, name: "Brochetas de Queso", price: 65, img: "https://images.unsplash.com/photo-1547516508-4c1f9c73a91e?w=500"},
                {id:2, name: "Yakimeshi Especial", price: 95, img: "https://images.unsplash.com/photo-1512314889357-e157c22f938d?w=500"}
            ],
            "Paquetes": [
                {id:3, name: "Mini Paquete Kyto", price: 120, img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=500"},
                {id:4, name: "Kyto Box PRO", price: 530, img: "https://images.unsplash.com/photo-1583623025817-d180a2221d0a?w=500"}
            ],
            "Rollos del Chef": [
                {id:5, name: "Dragon Roll", price: 180, img: "https://images.unsplash.com/photo-1617196034183-421b4917c92d?w=500"},
                {id:6, name: "Mar y Tierra", price: 215, img: "https://images.unsplash.com/photo-1559466273-d95e72debaf8?w=500"}
            ]
        };

        let cart = [];

        // RELOJ
        function updateTime() {
            const now = new Date();
            document.getElementById('time-txt').innerText = now.toLocaleTimeString('es-MX', {hour12:false});
        }
        setInterval(updateTime, 1000);

        // RENDER MENU
        function renderMenu() {
            const container = document.getElementById('menu-container');
            let html = '';
            for (const cat in MENU) {
                html += `
                <section>
                    <h2 class="text-4xl font-black uppercase italic mb-10 flex items-center gap-4">
                        <span class="w-10 h-1 bg-red-600"></span> ${cat}
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${MENU[cat].map(item => `
                            <div class="product-card">
                                <img src="${item.img}" class="w-full h-48 object-cover">
                                <div class="p-6">
                                    <div class="flex justify-between items-start mb-4">
                                        <h3 class="font-black uppercase text-xl">${item.name}</h3>
                                        <span class="text-red-600 font-black">$${item.price}</span>
                                    </div>
                                    <button onclick="addToCart(${item.id})" class="w-full bg-white text-black py-3 rounded-xl font-black uppercase text-xs hover:bg-red-600 hover:text-white transition">Agregar</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
            }
            container.innerHTML = html;
        }

        // CART LOGIC
        function addToCart(id) {
            let found;
            for(let cat in MENU) {
                const item = MENU[cat].find(i => i.id === id);
                if(item) { found = item; break; }
            }
            cart.push({...found, cartId: Date.now()});
            updateCartUI();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(i => i.cartId !== cartId);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            const sub = cart.reduce((acc, i) => acc + i.price, 0);
            
            document.getElementById('subtotal-val').innerText = `$${sub}`;
            document.getElementById('total-val').innerText = `$${sub > 0 ? sub + 40 : 0}`;

            container.innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                    <div>
                        <p class="font-black uppercase text-sm">${i.name}</p>
                        <p class="text-red-600 font-bold">$${i.price}</p>
                    </div>
                    <button onclick="removeFromCart(${i.cartId})" class="text-gray-500 hover:text-white"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function toggleProfile() {
            const m = document.getElementById('profile-modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function loginSim() {
            alert("Login con Google exitoso!");
            toggleProfile();
            document.getElementById('profile-btn').innerHTML = '<i class="fa-solid fa-user-check text-green-500 text-xl"></i>';
        }

        function sendWhatsApp() {
            const name = document.getElementById('order-name').value;
            const dir = document.getElementById('order-dir').value;
            if(!name || !dir) return alert("Por favor llena tus datos");
            if(cart.length === 0) return alert("Bolsa vacía");

            let itemsTxt = cart.map(i => `- ${i.name} ($${i.price})`).join('%0A');
            const sub = cart.reduce((acc, i) => acc + i.price, 0);
            const msg = `*NUEVO PEDIDO KYTO*%0A%0A*Cliente:* ${name}%0A*Dirección:* ${dir}%0A%0A*Pedido:*%0A${itemsTxt}%0A%0A*Subtotal:* $${sub}%0A*Envío:* $40%0A*TOTAL:* $${sub+40}%0A%0A_Pedido desde sitio web_`;
            window.open(`https://wa.me/522311511435?text=${msg}`);
        }

        // MINIGAME
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, score = 0, pX = 150, objects = [];

        function startMiniGame() {
            const isMobile = window.innerWidth < 768;
            const frame = document.getElementById('hw-frame');
            if(isMobile) {
                frame.className = 'mobile-frame';
                canvas.width = 300; canvas.height = 580;
            } else {
                frame.className = 'pc-frame';
                canvas.width = 776; canvas.height = 476;
            }
            
            document.getElementById('game-modal').style.display = 'flex';
            document.getElementById('game-ui').classList.add('hidden');
            gameActive = true; score = 0; objects = [];
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if(!gameActive) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // Player
            ctx.fillStyle = '#E31C24';
            ctx.fillRect(pX - 40, canvas.height - 30, 80, 10);

            // Sushi falling
            if(Math.random() < 0.05) objects.push({x: Math.random()*canvas.width, y: 0});
            
            objects.forEach((o, i) => {
                o.y += 5;
                ctx.fillStyle = 'white';
                ctx.fillRect(o.x - 10, o.y - 10, 20, 20);
                
                if(o.y > canvas.height - 30 && o.x > pX - 50 && o.x < pX + 50) {
                    score++; objects.splice(i, 1);
                } else if(o.y > canvas.height) {
                    gameActive = false;
                    document.getElementById('game-ui').classList.remove('hidden');
                }
            });

            ctx.fillStyle = 'white';
            ctx.font = '30px Outfit';
            ctx.fillText(`SCORE: ${score}`, 20, 40);
            if(gameActive) requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            pX = e.clientX - rect.left;
        });

        canvas.addEventListener('touchmove', e => {
            const rect = canvas.getBoundingClientRect();
            pX = e.touches[0].clientX - rect.left;
            e.preventDefault();
        }, {passive: false});

        function closeGame() {
            gameActive = false;
            document.getElementById('game-modal').style.display = 'none';
        }

        window.onload = renderMenu;
    </script>
</body>
</html>
