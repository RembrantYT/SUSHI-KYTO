<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUSHI-KYTO | NEXO PRO SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700;900&display=swap');
        
        :root {
            --kyto-red: #E31C24;
            --nexo-blue: #007AFF;
            --nexo-green: #34C759;
            --glass-white: rgba(255, 255, 255, 0.08);
            --glass-dark: rgba(10, 10, 10, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; transition: all 0.4s ease; overflow-x: hidden; }
        body.dark-mode { background-color: #000; color: white; }
        body.light-mode { background-color: #F5F5F7; color: #1D1D1F; }

        /* RELOJ NEXO TRANSPARENTE CON SEGUNDOS */
        .reloj-nexo {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            font-variant-numeric: tabular-nums;
        }
        body.light-mode .reloj-nexo { color: rgba(0, 0, 0, 0.8); }

        /* CELULAR NEXO HARDWARE */
        .nexo-phone-body {
            width: 310px; height: 600px; border-radius: 50px; padding: 12px;
            background: linear-gradient(135deg, var(--nexo-blue) 0%, var(--nexo-green) 100%);
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.7);
            position: relative; border: 2px solid rgba(255,255,255,0.3);
        }
        .screen-content { background: #000; width: 100%; height: 100%; border-radius: 40px; overflow: hidden; position: relative; }

        /* WHATSAPP LOGO FIX */
        .wa-float {
            position: fixed; bottom: 30px; left: 30px; 
            background: #25D366; color: white; 
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3); z-index: 999;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .wa-float:hover { transform: scale(1.1) rotate(5deg); }
        .wa-float i { font-size: 35px; line-height: 0; display: block; } /* Fix de centrado */

        /* MODALES APPLE */
        .glass-blur { backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-apple { animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
    </style>
</head>
<body class="dark-mode no-scrollbar">

    <div class="fixed top-0 w-full z-[200] pt-10 pb-6 pointer-events-none">
        <div class="flex flex-col items-center">
            <div id="reloj-digital" class="reloj-nexo text-6xl md:text-8xl font-black italic tracking-tighter">00:00:00</div>
            <div class="mt-2 flex items-center gap-2">
                <span class="h-[1px] w-8 bg-white/20"></span>
                <span class="text-[9px] font-black uppercase tracking-[6px] text-white/40">Powered by NEXO</span>
                <span class="h-[1px] w-8 bg-white/20"></span>
            </div>
            <div class="text-[8px] text-white/20 font-bold uppercase mt-1">Reloj Importado por el Equipo NEXO</div>
        </div>
    </div>

    <nav class="fixed top-44 w-full z-[150] px-6">
        <div class="container mx-auto flex justify-between items-center bg-white/5 glass-blur p-4 rounded-3xl border border-white/10">
            <div class="text-2xl font-black italic tracking-tighter">KYTO<span class="text-red-600">寿司</span></div>
            
            <div class="flex items-center gap-5">
                <button onclick="toggleTheme()" class="text-lg w-10 h-10 rounded-full hover:bg-white/10 transition"><i id="theme-btn" class="fa-solid fa-sun"></i></button>
                
                <div id="google-trigger">
                    <button onclick="realGoogleLogin()" class="flex items-center gap-2 bg-white text-black px-4 py-2 rounded-2xl font-black text-[10px] uppercase">
                        <img src="https://www.google.com/favicon.ico" class="w-3"> Iniciar Sesión
                    </button>
                </div>

                <div id="user-active" class="hidden flex items-center gap-3 bg-white/10 p-1 pr-4 rounded-2xl cursor-pointer border border-white/5" onclick="toggleProfile()">
                    <img id="u-pfp" src="" class="w-8 h-8 rounded-xl border border-red-600">
                    <span id="u-alias" class="text-[10px] font-black uppercase">User</span>
                </div>

                <button onclick="toggleCart()" class="relative">
                    <i class="fa-solid fa-bag-shopping text-2xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-lg">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 pt-[32rem] pb-40">
        
        <section class="mb-24">
            <h2 class="text-4xl font-black mb-12 italic uppercase border-l-8 border-red-600 pl-6">セット Paquetes SUSHI-Kyto</h2>
            <div id="grid-paquetes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                </div>
        </section>

        <section class="mb-24">
            <h2 class="text-4xl font-black mb-12 italic uppercase border-l-8 border-red-600 pl-6">巻き寿司 Rollos de Autor</h2>
            <div id="grid-rollos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </section>
    </main>

    <a href="https://wa.me/522311511435?text=Vengo%20de%20la%20web%20Kyto,%20necesito%20ayuda%20del%20Equipo%20KYTO." target="_blank" class="wa-float">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <div id="modal-juego" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-black/95 backdrop-blur-2xl">
        <div class="nexo-phone-body animate-apple">
            <div class="screen-content">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-black rounded-b-2xl z-20 flex items-center justify-center">
                    <div class="w-2 h-2 bg-zinc-800 rounded-full mr-2"></div>
                    <div class="w-10 h-1 bg-zinc-900 rounded-full"></div>
                </div>

                <canvas id="gameCanvas" width="286" height="576"></canvas>

                <div id="ui-game-over" class="absolute inset-0 bg-black/90 hidden flex flex-col items-center justify-center text-center p-8">
                    <h4 class="text-5xl font-black text-red-600 italic mb-4 uppercase">Game<br>Over</h4>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-10">El Equipo NEXO te recomienda practicar más</p>
                    <button onclick="reiniciarJuego()" class="bg-white text-black px-12 py-4 rounded-3xl font-black text-xs uppercase tracking-tighter">Reintentar</button>
                </div>

                <div class="absolute bottom-8 left-0 w-full text-center">
                    <span id="score-val" class="text-2xl font-black italic text-white/50">SCORE: 0</span>
                </div>
            </div>
            <button onclick="toggleGame()" class="absolute -bottom-12 left-1/2 -translate-x-1/2 text-white/30 font-black uppercase text-[9px] tracking-[5px]">Apagar NEXO Device</button>
        </div>
    </div>

    <div onclick="toggleGame()" class="fixed bottom-10 right-10 z-[250] cursor-pointer group">
        <div class="bg-gradient-to-br from-yellow-400 to-yellow-600 w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border-4 border-white/10 group-hover:scale-110 transition">
            <i class="fa-solid fa-cat text-5xl text-yellow-900"></i>
        </div>
    </div>

    <div id="bolsa-sidebar" class="fixed inset-y-0 right-[-100%] w-full md:w-[500px] bg-black/90 glass-blur z-[300] shadow-2xl transition-all duration-700 flex flex-col border-l border-white/10">
        <div class="p-10 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-4xl font-black italic">BOLSA</h2>
            <button onclick="toggleCart()" class="text-5xl font-light">&times;</button>
        </div>

        <div class="flex-grow overflow-y-auto p-10 no-scrollbar">
            <div id="bolsa-items" class="space-y-6 mb-12"></div>
            
            <div id="checkout-form" class="space-y-6 pt-10 border-t border-white/10">
                <h3 class="text-[11px] font-black text-red-600 uppercase tracking-[4px]">Confirmar Entrega</h3>
                <input type="text" id="c-nombre" placeholder="TU NOMBRE" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl outline-none focus:border-red-600 transition font-bold">
                <input type="tel" id="c-tel" placeholder="NÚMERO DE TELÉFONO" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl outline-none focus:border-red-600 transition font-bold">
                <textarea id="c-dir" placeholder="DIRECCIÓN EN TEZIUTLÁN (REFERENCIAS)" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl outline-none focus:border-red-600 transition font-bold" rows="3"></textarea>
                
                <select id="c-pago" class="w-full bg-white/5 border border-white/10 p-6 rounded-3xl outline-none font-bold appearance-none">
                    <option class="bg-black" value="Efectivo">Efectivo</option>
                    <option class="bg-black" value="Transferencia">Transferencia</option>
                    <option class="bg-black" value="Terminal">Terminal Repartidor</option>
                </select>
            </div>
        </div>

        <div class="p-10 border-t border-white/5">
            <div class="flex justify-between text-4xl font-black italic mb-8">
                <span>TOTAL:</span>
                <span id="monto-total">$0</span>
            </div>
            <button onclick="enviarPedido()" class="w-full bg-red-600 py-7 rounded-[2.5rem] font-black uppercase text-xl tracking-widest">Enviar Orden</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS COMPLETA (24 PRODUCTOS) ---
        const MENU = {
            paquetes: [
                {id: 1, name: "Mini Paquete", price: 120, img: "21653.png", desc: "Roll Empanizado + Brocheta + Pasta/Arroz"},
                {id: 2, name: "Kyto Box", price: 530, img: "21654.png", desc: "3 Rollos + Yakimeshi + Brochetas + Onigiris"},
                {id: 3, name: "Paquete Dúo", price: 340, img: "21655.png", desc: "2 Rollos Especiales + Entradas + Bebida"},
                {id: 4, name: "Charola Kyto", price: 890, img: "21656.png", desc: "6 Rollos a elegir + 4 Entradas + Postre"},
                {id: 5, name: "Set Familiar", price: 420, img: "21657.png", desc: "4 Rollos clásicos + Arroz Familiar"},
                {id: 6, name: "Sushi & Wing Set", price: 290, img: "21658.png", desc: "Roll Especial + 6 Alitas + Papas"}
            ],
            rollos: [
                {id: 101, name: "Avocado Roll", price: 120, desc: "Aguacate por fuera"},
                {id: 102, name: "Filadelfia", price: 105, desc: "Salmón y Queso"},
                {id: 103, name: "Hannibal", price: 250, desc: "Arrachera Premium"},
                {id: 104, name: "Mar y Tierra", price: 215, desc: "Res y Camarón"},
                {id: 105, name: "Eby Furay", price: 145, desc: "Camarón Crujiente"},
                {id: 106, name: "Dragon Roll", price: 180, desc: "Anguila ahumada"},
                {id: 107, name: "California", price: 105, desc: "Surimi y Pepino"},
                {id: 108, name: "Tampico", price: 110, desc: "Pasta Tampico"},
                {id: 109, name: "Nexo Special", price: 230, desc: "Inspirado en NEXO"},
                {id: 110, name: "Spicy Tuna", price: 160, desc: "Atún y Picante"},
                {id: 111, name: "Mango Roll", price: 135, desc: "Mango de temporada"},
                {id: 112, name: "Kiwi Maki", price: 130, desc: "Cubierto de Kiwi"},
                {id: 113, name: "Banana Sushi", price: 115, desc: "Platano frito arriba"},
                {id: 114, name: "Crunchy Roll", price: 155, desc: "Tempura extra crujiente"},
                {id: 115, name: "Salmon Skin", price: 170, desc: "Piel de salmón frita"},
                {id: 116, name: "Vegetariano", price: 95, desc: "Verduras al vapor"},
                {id: 117, name: "Rainbow Roll", price: 210, desc: "Pescados variados"},
                {id: 118, name: "Caterpillar", price: 195, desc: "Anguila y aguacate"}
            ]
        };

        let carrito = [];
        let usuario = null;

        // --- RELOJ BLANCO TRANSPARENTE CON SEGUNDOS ---
        function actualizarReloj() {
            const ahora = new Date();
            const h = String(ahora.getHours()).padStart(2, '0');
            const m = String(ahora.getMinutes()).padStart(2, '0');
            const s = String(ahora.getSeconds()).padStart(2, '0');
            document.getElementById('reloj-digital').innerText = `${h}:${m}:${s}`;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // --- RENDERIZADO ---
        function renderMenu() {
            const pGrid = document.getElementById('grid-paquetes');
            const rGrid = document.getElementById('grid-rollos');

            pGrid.innerHTML = MENU.paquetes.map(p => `
                <div class="bg-white/5 border border-white/5 p-8 rounded-[3.5rem] group hover:border-red-600 transition-all duration-500">
                    <img src="fotos/${p.img}" class="w-full h-56 object-cover rounded-[2.5rem] mb-8 group-hover:scale-105 transition">
                    <h3 class="text-3xl font-black italic uppercase">${p.name}</h3>
                    <p class="text-[11px] text-gray-500 font-bold uppercase mt-2 tracking-widest">${p.desc}</p>
                    <div class="flex justify-between items-center mt-8">
                        <span class="text-4xl font-black text-red-600 italic">$${p.price}</span>
                        <button onclick="agregar(${p.id}, 'paquetes')" class="bg-red-600 w-16 h-16 rounded-3xl flex items-center justify-center text-2xl shadow-xl shadow-red-900/30"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            `).join('');

            rGrid.innerHTML = MENU.rollos.map(r => `
                <div class="bg-white/5 border border-white/5 p-5 rounded-[2rem] flex flex-col justify-between hover:bg-white/10 transition">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="font-black text-xs uppercase italic">${r.name}</h4>
                            <span class="text-red-600 font-black text-xs">$${r.price}</span>
                        </div>
                        <p class="text-[9px] text-gray-500 font-bold uppercase">${r.desc}</p>
                    </div>
                    <button onclick="agregar(${r.id}, 'rollos')" class="mt-4 bg-white/5 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-red-600 transition">Añadir</button>
                </div>
            `).join('');
        }

        // --- CARRITO ---
        function agregar(id, cat) {
            const item = MENU[cat].find(i => i.id === id);
            carrito.push({...item, cartId: Date.now()});
            actualizarUI();
        }

        function quitar(cartId) {
            carrito = carrito.filter(i => i.cartId !== cartId);
            actualizarUI();
        }

        function actualizarUI() {
            const lista = document.getElementById('bolsa-items');
            const total = document.getElementById('monto-total');
            document.getElementById('cart-count').innerText = carrito.length;
            
            const suma = carrito.reduce((acc, i) => acc + i.price, 0);
            total.innerText = `$${suma > 0 ? suma + 40 : 0}`;

            lista.innerHTML = carrito.map(i => `
                <div class="bg-white/5 p-6 rounded-3xl flex justify-between items-center animate-apple">
                    <div><p class="font-black text-sm uppercase italic">${i.name}</p><p class="text-red-600 font-black">$${i.price}</p></div>
                    <button onclick="quitar(${i.cartId})" class="text-gray-500 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function toggleCart() {
            const s = document.getElementById('bolsa-sidebar');
            s.style.right = s.style.right === "0px" ? "-100%" : "0px";
        }

        // --- AUTH GOOGLE ---
        function realGoogleLogin() {
            usuario = {
                name: "Cliente Kyto",
                img: "https://ui-avatars.com/api/?name=Cliente+Kyto&background=007AFF&color=fff&bold=true"
            };
            document.getElementById('google-trigger').classList.add('hidden');
            document.getElementById('user-active').classList.remove('hidden');
            document.getElementById('u-pfp').src = usuario.img;
            document.getElementById('u-alias').innerText = usuario.name;
            document.getElementById('c-nombre').value = usuario.name;
        }

        function toggleTheme() {
            const b = document.body;
            const i = document.getElementById('theme-btn');
            if(b.classList.contains('dark-mode')) {
                b.classList.replace('dark-mode', 'light-mode');
                i.classList.replace('fa-sun', 'fa-moon');
            } else {
                b.classList.replace('light-mode', 'dark-mode');
                i.classList.replace('fa-moon', 'fa-sun');
            }
        }

        // --- GAME: NEXO SENSEI (CON GAME OVER) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, puntaje = 0, nv = 1, v = 3, pX = 143, items = [];

        function toggleGame() {
            gameActive = !gameActive;
            document.getElementById('modal-juego').classList.toggle('hidden');
            if(gameActive) reiniciarJuego();
        }

        function reiniciarJuego() {
            puntaje = 0; nv = 1; v = 3; items = []; gameActive = true;
            document.getElementById('ui-game-over').classList.add('hidden');
            bucleGame();
        }

        function bucleGame() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, 286, 576);
            
            nv = Math.floor(puntaje / 10) + 1;
            v = 3 + (nv * 0.8);
            document.getElementById('score-val').innerText = `SCORE: ${puntaje} | LV: ${nv}`;

            // Player (Nexo Tray)
            ctx.fillStyle = "#FFF";
            ctx.roundRect(pX - 35, 520, 70, 12, 6);
            ctx.fill();

            if(Math.random() < 0.02 * nv) items.push({x: Math.random()*260, y: 0});

            items.forEach((s, i) => {
                s.y += v;
                // Sushi Art
                ctx.fillStyle = "#E31C24";
                ctx.beginPath(); ctx.arc(s.x, s.y, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillRect(s.x-6, s.y-4, 12, 8);

                if(s.y > 520 && s.x > pX - 40 && s.x < pX + 40) {
                    puntaje++;
                    items.splice(i, 1);
                }
                
                // GAME OVER
                if(s.y > 576) {
                    gameActive = false;
                    document.getElementById('ui-game-over').classList.remove('hidden');
                }
            });

            if(gameActive) requestAnimationFrame(bucleGame);
        }

        canvas.addEventListener('mousemove', (e) => pX = e.clientX - canvas.getBoundingClientRect().left);
        canvas.addEventListener('touchmove', (e) => {
            pX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            e.preventDefault();
        });

        function enviarPedido() {
            if(carrito.length === 0) return alert("Bolsa vacía");
            const nom = document.getElementById('c-nombre').value;
            const dir = document.getElementById('c-dir').value;
            if(!nom || !dir) return alert("Faltan datos de entrega");

            window.open(`https://wa.me/522311511435?text=ORDEN%20KYTO-WEB%0ACliente:%20${nom}%0ADirección:%20${dir}%0APago:%20${document.getElementById('c-pago').value}%0AProductos:%20${carrito.length}`, '_blank');
        }

        renderMenu();
    </script>
</body>
</html>
